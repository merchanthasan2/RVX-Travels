<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Royal Visa Xpert</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .thank-you-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .success-card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        .success-icon {
            color: #10b981;
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Royal Visa <span>Xpert</span></a>

            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="visas.html" class="nav-link">Visas</a>
                <a href="index.html#other-services" class="nav-link">Other Services</a>
                <a href="about.html" class="nav-link">About</a>
            </div>

            <div class="nav-actions">
                <a href="https://wa.me/919833456675" target="_blank" class="nav-whatsapp-btn" title="WhatsApp Us">
                    <i data-lucide="message-circle"></i>
                </a>
                <a href="enquiry.html" class="btn btn-primary nav-enquiry-btn">Send Enquiry</a>
            </div>

            <div class="mobile-menu-btn">
                <i data-lucide="menu"></i>
            </div>
        </div>
    </nav>

    <div class="thank-you-container">
        <div class="success-card">
            <i data-lucide="check-circle" class="success-icon"></i>
            <h1>Inquiry Received!</h1>
            <p>Thanks for reaching out. We have received your details and will get back to you within <strong>one
                    business day</strong>.</p>

            <div style="margin-top: 2rem;">
                <a href="index.html" class="btn btn-primary">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
