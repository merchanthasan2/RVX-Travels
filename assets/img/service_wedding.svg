<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Destination Wedding</title>
  <desc id="desc">Stylized beach wedding scene with floral arch, sea, and sunset sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbe7d6"/>
      <stop offset="45%" stop-color="#f7c9a8"/>
      <stop offset="100%" stop-color="#f3a889"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#64b9c9"/>
      <stop offset="100%" stop-color="#2f7f98"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f1d8b0"/>
      <stop offset="100%" stop-color="#e7c08c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5b2b2b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#sky)"/>
