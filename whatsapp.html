<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Opening WhatsApp...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(135deg, #eef2ff 0%, #fff7ed 100%);
            font-family: Poppins, Arial, sans-serif;
            color: #1e2a78;
        }

        .panel {
            width: min(460px, 100%);
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(30, 42, 120, 0.12);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 20px;
            color: #475569;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 170px;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-primary {
            background: #25d366;
            color: #fff;
        }

        .btn-secondary {
            background: #fff;
            color: #1e2a78;
            border: 1px solid rgba(30, 42, 120, 0.18);
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Opening WhatsApp...</h1>
        <p>If WhatsApp does not open automatically, use one of the buttons below.</p>
        <div class="actions">
            <a id="open-app" class="btn btn-primary" href="#">Open WhatsApp App</a>
            <a id="open-web" class="btn btn-secondary" href="#">Open WhatsApp Web</a>
        </div>
    </main>

    <script>
        (function () {
            const phone = ['91', '95949', '60707'].join('');
            const presets = {
                visa: "Hi, I'd like to enquire about visa services"
            };
            const userAgent = navigator.userAgent || navigator.vendor || window.opera || '';
            const isAndroid = /Android/i.test(userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(userAgent);

            const params = new URLSearchParams(window.location.search);
            const message = presets[params.get('preset')] || '';
            const encodedMessage = encodeURIComponent(message);
            const query = encodedMessage ? `?phone=${phone}&text=${encodedMessage}&type=phone_number&app_absent=0` : `?phone=${phone}&type=phone_number&app_absent=0`;
            const nativeLink = encodedMessage ? `whatsapp://send?phone=${phone}&text=${encodedMessage}` : `whatsapp://send?phone=${phone}`;
            const androidIntent = encodedMessage
                ? `intent://send?phone=${phone}&text=${encodedMessage}#Intent;scheme=whatsapp;package=com.whatsapp;end`
                : `intent://send?phone=${phone}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
            const webLink = `https://api.whatsapp.com/send/${query}`;
            const appLink = isAndroid ? androidIntent : nativeLink;
            const fallbackDelay = isAndroid ? 1800 : 2600;

            document.getElementById('open-app').href = appLink;
            document.getElementById('open-web').href = webLink;

            if (!isAndroid && !isIOS) {
                window.location.replace(webLink);
                return;
            }

            let fallbackTimer = null;
            const cleanup = () => {
                if (fallbackTimer) {
                    window.clearTimeout(fallbackTimer);
                    fallbackTimer = null;
                }
                window.removeEventListener('pagehide', cleanup);
                window.removeEventListener('blur', cleanup);
                document.removeEventListener('visibilitychange', handleVisibilityChange);
            };

            const handleVisibilityChange = () => {
                if (document.hidden) {
                    cleanup();
                }
            };

            window.addEventListener('pagehide', cleanup, { once: true });
            window.addEventListener('blur', cleanup, { once: true });
            document.addEventListener('visibilitychange', handleVisibilityChange);

            fallbackTimer = window.setTimeout(() => {
                cleanup();
                if (!document.hidden) {
                    window.location.replace(webLink);
                }
            }, fallbackDelay);

            window.location.href = appLink;
        })();
    </script>
</body>
</html>
